name: Jira Agent

on:
  repository_dispatch:
    types:
      - jira-epic-created
      - jira-epic-approved
      - jira-epic-refine
      - confluence-page-triaged

permissions:
  contents: read
  id-token: write

jobs:
  confluence-triage:
    if: github.event.action == 'confluence-page-triaged'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Confluence triage agent
        uses: anthropics/claude-code-action@v1
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.JIRA_USER_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PAGE_ID: ${{ github.event.client_payload.page_id }}
          PAGE_TITLE: ${{ github.event.client_payload.page_title }}
          PAGE_URL: ${{ github.event.client_payload.page_url }}
          SPACE_KEY: ${{ github.event.client_payload.space_key }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 25
            --mcp-config .claude/mcp-jira.json
            --allowedTools "Bash,Read,Task,mcp__atlassian"
          prompt: |
            You are the Confluence Triage Agent. A BA labeled a Confluence page `needs-triage`, meaning it's ready to become a tracked Epic.

            ## Context
            - Confluence page ID: ${{ github.event.client_payload.page_id }}
            - Page title: ${{ github.event.client_payload.page_title }}
            - Page URL: ${{ github.event.client_payload.page_url }}
            - Space key: ${{ github.event.client_payload.space_key }}
            - Jira target project: `QAT`
            - Atlassian MCP is available (tools prefixed `mcp__atlassian__`). It can read both Jira and Confluence — credentials for both are passed via env.

            ## Mission

            1. **Fetch the Confluence page content** via the MCP. Extract the rendered page body (the actual requirements text, not just metadata). Ignore template boilerplate.

            2. **Idempotency check.** Search Jira for an existing Epic in project QAT whose description contains `Confluence Page ID: $PAGE_ID`. If one exists:
               - Post a comment on that existing Epic: "Confluence page re-labeled for triage — already tracked by this Epic. Re-run `refine:` comment here if requirements changed."
               - Exit cleanly. **Do not create a duplicate Epic.**

            3. **Guard against empty pages.** If the page body is essentially empty (< 30 words excluding the title) or contains only Confluence template placeholders, post a comment ON THE CONFLUENCE PAGE saying "Cannot triage — page has no requirements content. Please add detail and re-label." and exit.

            4. **Create a new Jira Epic in QAT** via the MCP with these fields:
               - Project: `QAT`
               - Issue type: `Epic`
               - Summary: use the page title verbatim
               - Description (this EXACT format — the markers matter for downstream rules):
                 ```
                 [Confluence-sourced]

                 **Source**: ${{ github.event.client_payload.page_url }}
                 **Confluence Page ID**: ${{ github.event.client_payload.page_id }}
                 **Triaged at**: <ISO timestamp>

                 ---

                 <Copy/paraphrase the key requirements from the Confluence page here — 1–3 short paragraphs, preserving acceptance criteria and scope callouts. Do not include template scaffolding like "Participants" or "Date" sections from a meeting-notes template if present; extract only the substantive requirements.>
                 ```

               The `[Confluence-sourced]` marker on the first line is load-bearing — it prevents Rule A from double-triaging this Epic.

               Capture the new Epic key (e.g. `QAT-7`) from the create response.

            5. **Run the standard triage flow on the new Epic.** Same behaviour as the regular `jira-epic-created` path:
               - Analyze the requirement (type of change, schema impact, UI impact, risk signals)
               - Draft 3 tailored sub-task proposals (Dev Review / QA Validation / Data Schema Review) — same format rules
               - If no data impact is apparent, say so explicitly in the Data Schema Review section — don't invent work
               - Post ONE comment on the new Epic using the exact `🤖 **QA Agent proposal**` format used elsewhere

            6. **Back-link the Epic on the Confluence page.** Add a comment on the Confluence page: "Triaged — see Jira Epic `<NEW_EPIC_KEY>`" with a link to the Jira Epic. This closes the loop so BAs can navigate either direction.

            ## Hard rules
            - Never modify repo files, never use git/gh.
            - Don't create sub-tasks in this job — only the Epic and the proposal comment. A BA has to reply `approve` on the Epic to create sub-tasks.
            - If any API call fails, log the error clearly and exit non-zero.
            - If you can't determine whether an Epic already exists (search failed), err on the side of NOT creating a new one — post a failure comment on the Confluence page asking a human to check.

  triage:
    if: github.event.action == 'jira-epic-created'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pre-warm mcp-atlassian cache
        run: uvx --help mcp-atlassian >/dev/null 2>&1 || true

      - name: Run Jira triage agent
        uses: anthropics/claude-code-action@v1
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EPIC_KEY: ${{ github.event.client_payload.issue_key }}
          EPIC_SUMMARY: ${{ github.event.client_payload.issue_summary }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --mcp-config .claude/mcp-jira.json
            --allowedTools "Bash,Read,Task,mcp__atlassian"
          prompt: |
            You are the Jira Triage Agent running in CI for a newly-created Epic.

            ## Context
            - Epic key: ${{ github.event.client_payload.issue_key }}
            - Epic summary: ${{ github.event.client_payload.issue_summary }}
            - Site: trobustech.atlassian.net
            - Project: QAT
            - Jira credentials are passed to the MCP server via env. Use the `atlassian` MCP server tools (names begin with `mcp__atlassian__`). If unsure of exact tool names, inspect available tools first before calling.

            ## Mission

            1. **Read the epic.** Fetch it via the Jira MCP server. Extract title, description, acceptance criteria (if any), and labels.

            2. **Check guards first:**
               - If the description is empty, missing, or fewer than 10 words: post a comment asking the BA to clarify — include 2–3 specific questions about scope, and exit.
               - If the epic already has sub-tasks: post `"Already has sub-tasks — skipping triage."` and exit.

            3. **Analyze** and categorize:
               - Type of change: backend / frontend / full-stack / data / infra
               - Does it touch DB schema or data pipelines?
               - Does it touch user-facing UI?
               - Any compliance or risk signals?

            4. **Draft 3 tailored sub-task proposals** — each needs a title and a 2–3 line description *specific to this epic*, not boilerplate:
               - **Dev Review** — what should devs specifically review for this change? (e.g. "validate that the new rate-limit middleware is applied to every `/auth/*` endpoint and not globally")
               - **QA Validation** — what behaviors should QA verify? List concrete acceptance tests.
               - **Data Schema Review** — what schema changes or data impact should data team assess? If **no data impact is apparent**, say so explicitly — do not invent a task.

            5. **Post ONE comment on the epic** using the MCP `add_comment` (or equivalent) tool. Use exactly this format:

               ```
               🤖 **QA Agent proposal** — reply with `approve` to create these sub-tasks.

               ### Dev Review
               **Title**: [tailored title]
               **Description**: [2–3 lines tailored to this epic]

               ### QA Validation
               **Title**: [tailored title]
               **Description**: [2–3 lines, include acceptance tests]

               ### Data Schema Review
               **Title**: [tailored title]
               **Description**: [2–3 lines, OR "No data changes detected — this sub-task should be skipped on approval."]

               ---
               _Generated by QA Agent. Comment `approve` on this epic to create these sub-tasks as children of ${{ github.event.client_payload.issue_key }}._
               ```

            6. **Do NOT create sub-tasks yet.** Only post the proposal comment. A human must reply `approve` first — that fires the second workflow.

            ## Hard rules
            - Never modify repo files.
            - Never use `git` or `gh` tools.
            - Never create Jira issues in this run — only comments.
            - If any Jira API call fails, log the error clearly and exit non-zero so the failure shows in Actions.

  refine-proposal:
    if: github.event.action == 'jira-epic-refine'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Jira proposal refiner
        uses: anthropics/claude-code-action@v1
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EPIC_KEY: ${{ github.event.client_payload.issue_key }}
          REFINE_COMMENT: ${{ github.event.client_payload.comment_body }}
          COMMENT_AUTHOR: ${{ github.event.client_payload.comment_author }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --mcp-config .claude/mcp-jira.json
            --allowedTools "Bash,Read,Task,mcp__atlassian"
          prompt: |
            You are the Jira Proposal Refiner. A BA asked you to revise an existing QA Agent proposal on epic ${{ github.event.client_payload.issue_key }}.

            ## Context
            - Epic key: ${{ github.event.client_payload.issue_key }}
            - BA's refinement comment: $REFINE_COMMENT
            - Comment author: ${{ github.event.client_payload.comment_author }}
            - Jira MCP available as `atlassian` (tools named `mcp__atlassian__*`).

            ## Mission

            1. **Read the epic** and all its comments via the Jira MCP.

            2. **Find the most recent QA Agent proposal comment** — body starts with `🤖 **QA Agent proposal`. Note the version: the original says just "proposal", subsequent revisions say "proposal (v2)", "proposal (v3)", etc.

            3. **Parse the refinement instructions** from the BA's comment. The instructions begin after the literal prefix `refine:` and may span multiple lines. They may ask you to:
               - Drop a sub-task entirely ("remove the Data Schema Review")
               - Add a new sub-task ("add a sub-task for performance testing")
               - Edit a sub-task's title or description ("make QA Validation more specific about concurrency")
               - Change focus or reorder
               Apply the changes verbatim — do NOT second-guess the BA's intent. If an instruction is ambiguous, ask for clarification in a reply comment and stop (don't post a revised proposal).

            4. **Post a NEW proposal comment** on the epic with the revised version. Use this format, replacing `N` with the next version number (previous + 1):

               ```
               🤖 **QA Agent proposal (vN)** — reply with `approve` to create these sub-tasks, or `refine: <instructions>` to iterate further.

               _Revised based on feedback from ${{ github.event.client_payload.comment_author }}:_ <one-line summary of what changed>

               ### Dev Review
               **Title**: ...
               **Description**: ...

               ### QA Validation
               **Title**: ...
               **Description**: ...

               ### Data Schema Review
               **Title**: ...
               **Description**: ... (or "Dropped per refinement request" if the BA asked to remove it)

               ---
               _Generated by QA Agent. Comment `approve` on this epic to create these sub-tasks as children of ${{ github.event.client_payload.issue_key }}._
               ```

               If the BA asked to drop a sub-task, keep the heading but set the description to "Dropped per refinement request" so the `create-subtasks` job later can skip it.

               If the BA asked to add a NEW sub-task beyond Dev/QA/Data, add it as a fourth `### <Category Name>` section with full title and description.

            ## Hard rules
            - Never modify repo files, never use git/gh.
            - Never create Jira issues in this job — only post a comment with the revised proposal.
            - If you can't find any previous proposal to revise, post a comment saying "No proposal found to refine. Please re-trigger triage by creating a new epic." and exit.
            - Always bump the version number (v2 after original, v3 after v2, etc.) so approval picks the latest.

  create-subtasks:
    if: github.event.action == 'jira-epic-approved'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Jira sub-task creator
        uses: anthropics/claude-code-action@v1
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          EPIC_KEY: ${{ github.event.client_payload.issue_key }}
          COMMENT_AUTHOR: ${{ github.event.client_payload.comment_author }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --mcp-config .claude/mcp-jira.json
            --allowedTools "Bash,Read,Task,mcp__atlassian"
          prompt: |
            You are the Jira Sub-task Creator. A user approved a proposal on Epic ${{ github.event.client_payload.issue_key }}.

            ## Context
            - Epic key: ${{ github.event.client_payload.issue_key }}
            - Approval comment author: ${{ github.event.client_payload.comment_author }}
            - Site: trobustech.atlassian.net
            - Project: QAT
            - Sub-task issue type id: `10015`
            - Jira MCP available as `atlassian`. Tool names start with `mcp__atlassian__`.

            ## Mission

            1. **Read the epic and its comments** via the Jira MCP.

            2. **Find the LATEST QA Agent proposal comment** — body starts with `🤖 **QA Agent proposal`. If multiple proposals exist (original + refinements), pick the one with the **highest version**. Revisions are labeled `(v2)`, `(v3)`, etc. The original has no version suffix — treat it as v1. If no proposal exists at all, post `"No proposal found — please wait for triage or re-create the epic."` and exit cleanly.

            3. **Parse every `### <Category>` section** in that proposal. There may be 3 by default (Dev Review, QA Validation, Data Schema Review) or more (the BA may have added extras via a `refine:` comment). Extract the title and description from each section.

            4. **For each parsed section, create a Jira Subtask** with:
               - project key: `QAT`
               - issuetype: `Subtask` (id `10015`)
               - parent: `${{ github.event.client_payload.issue_key }}`
               - summary: the parsed title
               - description: the parsed description
               - **Skip** any section whose description contains any of these phrases (case-insensitive): `"No data changes detected"`, `"Dropped per refinement request"`, `"this sub-task should be skipped"`.

            5. **Post a confirmation comment** on the epic listing exactly what was created and what was skipped:
               ```
               ✅ **QA Agent** created sub-tasks from proposal vN:
               - [QAT-XXX] <Category>: <title>
               - [QAT-XXX] <Category>: <title>
               - <Category>: skipped — <short reason>

               Please triage ownership — all sub-tasks unassigned.
               ```

            ## Hard rules
            - If sub-tasks with these exact titles already exist under this epic, skip duplicates — don't create copies. Report which were skipped in the confirmation comment.
            - Never modify repo files.
            - Never use `git` or `gh`.
            - If any Jira API call fails, log the error clearly and exit non-zero.
